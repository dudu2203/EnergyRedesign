<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סקר אנרגיה – NRG Redesign</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');
:root{--green:#2d7d46;--gl:#e8f5ec;--gm:#4a9e62;--dark:#1a2e22;--gray:#6b7c72;--bdr:#c8ddd0;--bg:#f4faf6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--dark);direction:rtl;}
.header{background:linear-gradient(135deg,var(--dark),var(--green));color:white;padding:16px 36px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 18px rgba(0,0,0,0.2);}
.logo-img{height:64px;width:auto;}
.htext h1{font-size:20px;font-weight:700;}
.htext p{font-size:12px;opacity:0.7;margin-top:2px;}
.hdate label{font-size:11px;opacity:0.65;display:block;margin-bottom:3px;text-align:left;}
.hdate input[type=date]{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:6px;color:white;padding:5px 9px;font-size:12px;font-family:'Heebo',sans-serif;direction:ltr;cursor:pointer;}
.pw{background:white;padding:10px 36px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:14px;}
.pb{flex:1;height:7px;background:var(--gl);border-radius:4px;overflow:hidden;}
.pf{height:100%;background:var(--gm);border-radius:4px;transition:width 0.4s;}
.pl{font-size:12px;color:var(--gray);white-space:nowrap;}
.wrap{max-width:940px;margin:22px auto;padding:0 16px 50px;}
.card{background:white;border-radius:12px;border:1px solid var(--bdr);margin-bottom:16px;overflow:hidden;}
.card:hover{box-shadow:0 3px 14px rgba(45,125,70,0.08);}
.ch{background:var(--gl);padding:13px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.cn{width:28px;height:28px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.ct{font-size:14px;font-weight:700;color:var(--dark);flex:1;}
.cg{font-size:15px;color:var(--green);transition:transform 0.3s;}
.cg.open{transform:rotate(180deg);}
.cb{padding:18px;display:none;}
.cb.open{display:block;}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px;margin-bottom:11px;}
.fgf{display:flex;flex-direction:column;gap:4px;}
.fgf.full{grid-column:1/-1;}
label{font-size:12px;font-weight:600;color:var(--gray);}
.req{color:#e53e3e;}
input[type=text],input[type=email],input[type=tel],input[type=number],select,textarea{border:1.5px solid var(--bdr);border-radius:7px;padding:8px 10px;font-family:'Heebo',sans-serif;font-size:13px;color:var(--dark);background:var(--bg);transition:border-color 0.2s,box-shadow 0.2s;width:100%;direction:rtl;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(45,125,70,0.1);background:white;}
textarea{min-height:70px;resize:vertical;}
.ckgrp{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;}
.cki{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;}
.cki input[type=checkbox]{width:14px;height:14px;accent-color:var(--green);}
.cab{display:flex;gap:9px;margin-bottom:11px;align-items:center;flex-wrap:wrap;}
.cpk{flex:1;min-width:200px;}
.badd{background:var(--green);color:white;border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;}
.badd:hover{background:var(--gm);}
.cl{display:flex;flex-direction:column;gap:8px;}
.cc{background:var(--gl);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px;}
.cch{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.ctag{background:var(--green);color:white;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
.bdel{background:#fff0f0;color:#c53030;border:1px solid #fca5a5;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;margin-right:auto;}
.ccf{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.brow{background:transparent;color:var(--green);border:1.5px dashed var(--green);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;margin-top:5px;font-family:'Heebo',sans-serif;}
.srow{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:7px;margin-top:5px;padding-top:5px;border-top:1px dashed var(--bdr);align-items:end;}
.ytog{display:flex;gap:9px;margin-bottom:13px;}
.yb{background:var(--gl);color:var(--green);border:1.5px solid var(--green);border-radius:7px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;}
.yb.active{background:var(--green);color:white;}
.ysc{display:none;}
.ysc.active{display:block;}
.fr{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.fc{width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.ff{display:none;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:8px;margin-right:22px;}
.ff.show{display:grid;}
.abar{display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
.bw{background:var(--green);color:white;border:none;border-radius:10px;padding:12px 26px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:7px;transition:transform 0.15s,box-shadow 0.15s;}
.bw:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(45,125,70,0.3);}
.bp{background:#c0392b;color:white;border:none;border-radius:10px;padding:12px 26px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;display:flex;align-items:center;gap:7px;transition:transform 0.15s;}
.bp:hover{transform:translateY(-2px);}
.bc{background:white;color:var(--gray);border:2px solid var(--bdr);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Heebo',sans-serif;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:white;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.3s;z-index:1000;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.ok{background:var(--green);}
.toast.err{background:#c53030;}
.dv{border:none;border-top:1px dashed var(--bdr);margin:14px 0;}
.ib{background:#fffbf0;border:1px solid #f6e05e;border-radius:7px;padding:9px 13px;font-size:12px;color:#744210;margin-bottom:11px;}
@media print{
  .header,.pw,.abar,.cab,.badd,.brow,.bdel,.ib,.ytog,.toast,.ch{display:none!important;}
  .cb{display:block!important;padding:4px 0!important;}
  .card{box-shadow:none!important;border:1px solid #ccc!important;margin-bottom:8px!important;page-break-inside:avoid;}
  .ff{display:grid!important;}
  body{background:white!important;}
  input,textarea,select{border:none!important;background:transparent!important;box-shadow:none!important;padding:1px 0!important;font-size:12px;}
}
</style>

</head>

var CUR_YEAR = 2026;
var PREV_YEAR = 2025;

function tog(id){
  var b=document.getElementById('b-'+id),t=document.getElementById('t-'+id);
  if(b.classList.contains('open')){b.classList.remove('open');t.classList.remove('open');}
  else{b.classList.add('open');t.classList.add('open');}
}
function switchYear(y){
  ['cur','prev'].forEach(function(k){
    document.getElementById('yr-'+k).classList.toggle('active',k===y);
    document.getElementById('yb-'+k).classList.toggle('active',k===y);
  });
}
function tf(id){document.getElementById(id).classList.toggle('show');}

var cardN=0,rowNums={};
function addCard(){
  var pk=document.getElementById('cpicker'),name=pk.value;
  if(!name){showToast('בחר צרכן מהרשימה','');return;}
  cardN++;
  var cid='c'+cardN,div=document.createElement('div');
  div.className='cc';div.id=cid;
  div.innerHTML='<div class="cch"><div class="ctag">'+esc(name)+'</div><button class="bdel" onclick="document.getElementById(\''+cid+'\').remove()">✕ הסר</button></div>'+
    '<div id="rf-'+cid+'">'+rowHTML(cid,0)+'</div>'+
    '<button class="brow" onclick="addRow(\''+cid+'\')">+ הוסף שורה נוספת</button>';
  document.getElementById('clist').appendChild(div);pk.value='';

function addRow(cid){
  if(!rowNums[cid])rowNums[cid]=0;rowNums[cid]++;
  var idx=rowNums[cid],rid=cid+'r'+idx,wrap=document.getElementById('rf-'+cid),div=document.createElement('div');
  div.className='srow';div.id=rid;
  div.innerHTML=innerRow(cid,idx)+'<div style="display:flex;align-items:flex-end;"><button class="bdel" onclick="document.getElementById(\''+rid+'\').remove()" style="margin:0">✕</button></div>';
  wrap.appendChild(div);
}
function rowHTML(cid,idx){return'<div class="ccf">'+innerRow(cid,idx)+'</div>';}
function innerRow(cid,idx){
  var p=cid+'_'+idx;
  return'<div class="fgf"><label>פרוט</label><input type="text" id="'+p+'_d" placeholder="תיאור טכני"></div>'+
    '<div class="fgf"><label>כמות</label><input type="text" id="'+p+'_q" placeholder="כמות"></div>'+
    '<div class="fgf"><label>הערה</label><input type="text" id="'+p+'_n" placeholder="הערה"></div>'+
    '<div class="fgf"><label>נצילות</label><input type="text" id="'+p+'_e" placeholder="יש/אין"></div>';
}
function getConsumers(){
  var cards=[];
  document.querySelectorAll('.cc').forEach(function(card){
    var name=card.querySelector('.ctag').textContent,rows=[];
    var mf=card.querySelector('.ccf');
    if(mf){var inp=mf.querySelectorAll('input');rows.push({d:inp[0]?inp[0].value:'',q:inp[1]?inp[1].value:'',n:inp[2]?inp[2].value:'',e:inp[3]?inp[3].value:''});}
    card.querySelectorAll('.srow').forEach(function(sr){var inp=sr.querySelectorAll('input');rows.push({d:inp[0]?inp[0].value:'',q:inp[1]?inp[1].value:'',n:inp[2]?inp[2].value:'',e:inp[3]?inp[3].value:''});});
    cards.push({name:name,rows:rows});
  });
  return cards;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function v(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function chk(id){var el=document.getElementById(id);return!!(el&&el.checked);}
function days(pre){
  var map={sun:'א׳',mon:'ב׳',tue:'ג׳',wed:'ד׳',thu:'ה׳',fri:'ו׳',sat:'ש׳'},res=[];
  for(var k in map){if(chk(pre+k))res.push(map[k]);}
  return res.join(', ')||'–';
}
function getDateStr(){
  var d=v('doc_date');if(!d)return'';
  var dt=new Date(d);return dt.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function energyLines(pre){
  var lines=[],e=v(pre+'_elec');
  if(e)lines.push('חשמל: כ–'+e+' מיליון קוט"ש');
  if(chk(pre+'_hd'))lines.push('סולר: כ–'+(v(pre+'_diesel')||'–')+' ליטר');
  if(chk(pre+'_hm'))lines.push('מזוט: כ–'+(v(pre+'_mazut')||'–')+' ליטר');
  if(chk(pre+'_hg'))lines.push('גז: כ–'+(v(pre+'_gas')||'–')+' '+(v(pre+'_gunit')||'ק״ג'));
  if(chk(pre+'_ho'))lines.push((v(pre+'_otype')||'אחר')+': כ–'+(v(pre+'_oqty')||'–')+' '+(v(pre+'_ounit')||''));
  return lines;
}
function updateProg(){
  var req=['factory_name','company_name','contact_name'],filled=req.filter(function(id){return v(id);}).length,pct=Math.round(filled/req.length*100);
  document.getElementById('pfil').style.width=pct+'%';
  document.getElementById('ptxt').textContent=pct+'% הושלם';
}
document.querySelectorAll('input,textarea,select').forEach(function(el){el.addEventListener('input',updateProg);});
function clearForm(){
  if(!confirm('למחוק את כל הנתונים?'))return;
  document.querySelectorAll('input[type=text],input[type=email],input[type=tel],input[type=number],textarea').forEach(function(el){el.value='';});
  document.querySelectorAll('input[type=checkbox]').forEach(function(el){el.checked=false;});
  document.querySelectorAll('.ff').forEach(function(el){el.classList.remove('show');});
  document.getElementById('clist').innerHTML='';
  updateProg();showToast('הטופס נוקה','ok');
}
function showToast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=(type==='ok'?'✅ ':type==='err'?'❌ ':'ℹ️ ')+msg;
  el.className='toast show '+(type||'');
  setTimeout(function(){el.classList.remove('show');},3500);
}

function exportPDF(){
  var ds=getDateStr();
  document.getElementById('phdate').textContent=ds?'תאריך: '+ds:'';
  document.getElementById('psig').style.display='block';
  document.getElementById('phead').style.display='flex';
  // open all sections for print
  document.querySelectorAll('.cb').forEach(function(b){b.style.display='block';});
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      document.getElementById('psig').style.display='none';
      document.getElementById('phead').style.display='none';
      document.querySelectorAll('.cb').forEach(function(b){b.style.display='';});
    },500);
  },100);
}

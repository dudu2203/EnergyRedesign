<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<pre id="out">טוען...</pre>
<script>
fetch('energy_tables.xlsx')
  .then(r => r.arrayBuffer())
  .then(buf => {
    const wb = XLSX.read(buf, { type: 'array' });
    const sheets = ["צ'ילרים", "משאבות", "מנועים", "מדחסי אוויר"];
    
    sheets.forEach(shName => {
      const ws = wb.Sheets[shName];
      if (!ws || !ws['!ref']) { console.log('לא נמצא: ' + shName); return; }
      const range = XLSX.utils.decode_range(ws['!ref']);
      console.log('\n' + '#'.repeat(70));
      console.log('גליון: "' + shName + '"  טווח: ' + ws['!ref']);
      console.log('#'.repeat(70));
      
      // הדפס כל תא עם מיקום, ערך, צבע
      for (let r = range.s.r; r <= range.e.r; r++) {
        let rowHasData = false;
        let rowStr = 'ש' + (r+1) + ': ';
        for (let c = range.s.c; c <= range.e.c; c++) {
          const addr = XLSX.utils.encode_cell({r, c});
          const cell = ws[addr];
          if (cell && (cell.v !== undefined && cell.v !== '')) {
            const col = XLSX.utils.encode_col(c);
            // בדוק צבע טקסט
            const fontColor = cell.s?.font?.color?.rgb || cell.s?.font?.color?.theme || '';
            const isRed = fontColor === 'FFFF0000' || fontColor === 'FF0000' || String(fontColor).toLowerCase().includes('ff0000') || String(fontColor) === '2';
            const colorMark = isRed ? '[RED]' : '';
            rowStr += `[${col}]${colorMark}"${cell.v}"  `;
            rowHasData = true;
          }
        }
        if (rowHasData) console.log(rowStr);
      }

      // נסה לקרוא גם עם parseField
      console.log('\n--- JSON array view ---');
      try {
        const arr = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        arr.forEach((row, ri) => {
          const hasData = row.some(c => c !== '' && c !== null && c !== undefined);
          if (hasData) {
            console.log('ש' + (ri+1) + ': ' + JSON.stringify(row));
          }
        });
      } catch(e) { console.log('שגיאה: ' + e); }
    });

  }).catch(e => console.error('שגיאה: ' + e));
</script>
</body>
</html>
